<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movies & TV — Watchlist</title>
  <link rel="stylesheet" href="style.css">
  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    /* ===== Dashboard-specific styles ===== */
    .dash { padding: 0; }

    .eyebrow {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .metric {
      background: var(--cream-deep);
      border-radius: 4px;
      padding: 0.875rem 1rem;
    }

    .metric-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--brown-muted);
      margin-bottom: 4px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .metric-value {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 28px;
      font-weight: 600;
      color: var(--brown-dark);
      line-height: 1;
    }

    .metric-sub {
      font-size: 11px;
      color: var(--brown-muted);
      margin-top: 3px;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
      align-items: center;
    }

    .filter-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--brown-muted);
      margin-right: 4px;
    }

    .pill {
      font-size: 11px;
      font-weight: 400;
      font-family: 'DM Sans', sans-serif;
      padding: 4px 14px;
      border-radius: 99px;
      border: 0.5px solid var(--border);
      background: var(--cream-main);
      color: var(--brown-text);
      cursor: pointer;
      transition: all 0.15s;
    }

    .pill.active {
      background: var(--brown-dark);
      color: var(--cream);
      border-color: var(--brown-dark);
    }

    .pill:hover:not(.active) {
      border-color: var(--brown-muted);
      color: var(--brown-dark);
    }

    .chart-section { margin-bottom: 2rem; }

    .chart-wrap { position: relative; width: 100%; }

    .legend-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--brown-text);
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .rating-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 1.5rem;
      padding: 12px 14px;
      background: var(--cream-deep);
      border-radius: 4px;
      border-left: 2px solid var(--accent);
      align-items: center;
    }

    .rating-legend-item {
      font-size: 12px;
      color: var(--brown-mid);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .rating-star { color: var(--accent); font-size: 13px; }
    .rating-sep { color: var(--border); font-size: 11px; }

    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 8px;
    }

    .movie-card {
      background: var(--cream-main);
      border: 0.5px solid var(--border);
      border-radius: 4px;
      padding: 10px 12px;
    }

    .movie-title {
      font-size: 13px;
      font-weight: 400;
      color: var(--brown-dark);
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .movie-meta { font-size: 11px; color: var(--brown-muted); }
    .movie-stars { color: var(--accent); font-size: 12px; margin-bottom: 3px; }

    .no-data {
      font-size: 13px;
      color: var(--brown-muted);
      font-style: italic;
      padding: 1rem 0;
    }
  </style>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <!-- Paste your existing header/nav partial here -->

  <div class="page-layout">

    <!-- ===== SIDEBAR ===== -->
    <!-- Paste your existing sidebar partial here -->

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content">

      <div class="dash">
        <p class="page-eyebrow">Movies &amp; TV dashboard</p>

        <!-- Rating legend -->
        <div class="rating-legend">
          <div class="rating-legend-item"><span class="rating-star">★</span> Bad</div>
          <span class="rating-sep">·</span>
          <div class="rating-legend-item"><span class="rating-star">★★</span> Ok</div>
          <span class="rating-sep">·</span>
          <div class="rating-legend-item"><span class="rating-star">★★★</span> Good</div>
          <span class="rating-sep">·</span>
          <div class="rating-legend-item"><span class="rating-star">★★★★</span> Great</div>
          <span class="rating-sep">·</span>
          <div class="rating-legend-item"><span class="rating-star">★★★★★</span> Amazing</div>
        </div>

        <!-- Filters -->
        <div class="filter-row">
          <span class="filter-label">Type</span>
          <button class="pill active" onclick="setType('all',this)">All</button>
          <button class="pill" onclick="setType('Movie',this)">Movies</button>
          <button class="pill" onclick="setType('TV Show',this)">TV shows</button>
        </div>
        <div class="filter-row" style="margin-bottom:1.75rem" id="yearFilter">
          <span class="filter-label">Year</span>
        </div>

        <!-- Metric cards -->
        <div class="metrics" id="metrics"></div>

        <hr class="content-rule">

        <!-- Ratings breakdown -->
        <div class="chart-section">
          <h2 class="section-title">Ratings breakdown</h2>
          <div class="legend-row">
            <div class="legend-item">
              <span class="legend-dot" style="background:#8B4513"></span>Movies
            </div>
            <div class="legend-item">
              <span class="legend-dot" style="background:#a08060"></span>TV shows
            </div>
          </div>
          <div class="chart-wrap" id="barWrap">
            <canvas id="barChart" role="img" aria-label="Bar chart of ratings 1 to 5 for movies and TV shows"></canvas>
          </div>
        </div>

        <!-- Top rated grid -->
        <div class="chart-section">
          <h2 class="section-title" id="topTitle">Top rated</h2>
          <div class="movie-grid" id="movieGrid"></div>
        </div>

        <!-- Recently watched list -->
        <div class="chart-section">
          <h2 class="section-title" id="recentTitle">Recently watched</h2>
          <div id="recentList"></div>
        </div>

      </div><!-- /.dash -->

    </main>
  </div><!-- /.page-layout -->

  <!-- ===== FOOTER ===== -->
  <!-- Paste your existing footer partial here -->

  <script>
    let RAW = [];
    let activeType = 'all';
    let activeYear = 'all';

    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQMyFIHvgJkpT1uvZr_FQ2HZRE6ZWyyzRWQvUYlon5n_vkCJqr1HxhpIERYa6VFzzuxTGmgRRbfDroa/pub?gid=2011963051&single=true&output=csv";

	function parseCSV(text) {
      const lines = text.trim().split('\n');
      const entries = lines.slice(1).map(row => {
        const cols = row.match(/(".*?"|[^,]+)(?=,|$)/g) || [];
        const c = cols.map(x => x.replace(/^"|"$/g, '').trim());
        const rawDate = c[0] || '';
        let watchYear = null;
        const d = new Date(rawDate);
        if (!isNaN(d) && d.getFullYear() > 2000) watchYear = String(d.getFullYear());
        return {
          title: c[1] || '',
          year: parseInt(c[2]) || 0,
          type: c[3] || 'Movie',
          rating: parseInt(c[5]) || 0,
          date: rawDate,
          watchYear
        };
      }).filter(m => m.title && m.rating);
    
      const seen = new Map();
      entries.forEach(m => {
        const key = m.title.toLowerCase() + '|' + m.year;
        if (!seen.has(key) || m.date > seen.get(key).date) {
          seen.set(key, m);
        }
      });
      return [...seen.values()];
    }

    function filtered() {
      return RAW.filter(m => {
        const typeOk = activeType === 'all' || m.type === activeType;
        const yearOk = activeYear === 'all' || m.watchYear === activeYear;
        return typeOk && yearOk;
      });
    }

    function renderYearPills() {
      const years = [...new Set(RAW.map(m => m.watchYear).filter(Boolean))]
        .sort((a, b) => b - a);
      const row = document.getElementById('yearFilter');
      row.innerHTML = '<span class="filter-label">Year</span>';
      const allBtn = document.createElement('button');
      allBtn.className = 'pill active';
      allBtn.textContent = 'All time';
      allBtn.onclick = function() { setYear('all', this); };
      row.appendChild(allBtn);
      years.forEach(y => {
        const btn = document.createElement('button');
        btn.className = 'pill';
        btn.textContent = y;
        btn.onclick = function() { setYear(y, this); };
        row.appendChild(btn);
      });
    }

    function setType(v, el) {
      activeType = v;
      el.closest('.filter-row').querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      renderAll();
    }

    function setYear(v, el) {
      activeYear = v;
      el.closest('.filter-row').querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      renderAll();
    }

    function stars(n) { return '★'.repeat(n) + '☆'.repeat(5 - n); }

    function renderMetrics() {
      const data = filtered();
      if (!data.length) {
        document.getElementById('metrics').innerHTML = '<p class="no-data">No entries for this filter.</p>';
        return;
      }
      const avg = data.reduce((s, m) => s + m.rating, 0) / data.length;
      const five = data.filter(m => m.rating === 5).length;
      const one = data.filter(m => m.rating === 1).length;
      document.getElementById('metrics').innerHTML = `
        <div class="metric">
          <div class="metric-label">Watched</div>
          <div class="metric-value">${data.length}</div>
          <div class="metric-sub">titles</div>
        </div>
        <div class="metric">
          <div class="metric-label">Avg rating</div>
          <div class="metric-value">${avg.toFixed(1)}</div>
          <div class="metric-sub">out of 5</div>
        </div>
        <div class="metric">
          <div class="metric-label">Amazing (★★★★★)</div>
          <div class="metric-value">${five}</div>
          <div class="metric-sub">${Math.round(five / data.length * 100)}% of total</div>
        </div>
        <div class="metric">
          <div class="metric-label">Bad (★)</div>
          <div class="metric-value">${one}</div>
          <div class="metric-sub">not for me</div>
        </div>
      `;
    }

    let barInstance = null;
    function renderBar() {
      const data = filtered();
      const movies = data.filter(m => m.type === 'Movie');
      const shows = data.filter(m => m.type === 'TV Show');
      const counts = arr => [1, 2, 3, 4, 5].map(r => arr.filter(m => m.rating === r).length);
      const wrap = document.getElementById('barWrap');
      wrap.style.height = Math.max(200, (activeType === 'all' ? 10 : 5) * 34 + 60) + 'px';
      if (barInstance) barInstance.destroy();
      const datasets = activeType === 'all'
        ? [
            { label: 'Movies', data: counts(movies), backgroundColor: '#8B4513', borderRadius: 3 },
            { label: 'TV shows', data: counts(shows), backgroundColor: '#a08060', borderRadius: 3 }
          ]
        : [{
            label: activeType === 'Movie' ? 'Movies' : 'TV shows',
            data: counts(data),
            backgroundColor: activeType === 'Movie' ? '#8B4513' : '#a08060',
            borderRadius: 3
          }];
      barInstance = new Chart(document.getElementById('barChart'), {
        type: 'bar',
        data: {
          labels: ['★ Bad', '★★ Ok', '★★★ Good', '★★★★ Great', '★★★★★ Amazing'],
          datasets
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { display: false }, ticks: { color: '#a08060', font: { size: 11 } } },
            y: { ticks: { stepSize: 1, color: '#a08060', precision: 0 }, grid: { color: 'rgba(165,128,96,0.15)' } }
          }
        }
      });
    }

    function renderRecentList() {
      const dated = filtered()
        .filter(m => m.watchYear)
        .sort((a, b) => b.date.localeCompare(a.date));
      const undated = filtered()
        .filter(m => !m.watchYear);
    
      const data = [...dated, ...undated];
      document.getElementById('recentTitle').textContent = `Recently watched (${data.length})`;
    
      if (!data.length) {
        document.getElementById('recentList').innerHTML = '<p class="no-data">No entries for this filter.</p>';
        return;
      }
    
      document.getElementById('recentList').innerHTML = `
        <table style="width:100%; border-collapse:collapse; font-size:13px;">
          <thead>
            <tr style="border-bottom: 1px solid var(--border);">
              <th style="text-align:left; padding:6px 8px; font-weight:500; font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--brown-muted);">Title</th>
              <th style="text-align:left; padding:6px 8px; font-weight:500; font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--brown-muted);">Type</th>
              <th style="text-align:left; padding:6px 8px; font-weight:500; font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--brown-muted);">Watched</th>
              <th style="text-align:left; padding:6px 8px; font-weight:500; font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--brown-muted);">Rating</th>
            </tr>
          </thead>
          <tbody>
            ${data.map(m => `
              <tr style="border-bottom: 0.5px solid var(--border-light);">
                <td style="padding:8px 8px; color:var(--brown-dark); font-weight:400;">${m.title} <span style="color:var(--brown-muted); font-weight:300;">(${m.year})</span></td>
                <td style="padding:8px 8px; color:var(--brown-muted);">${m.type}</td>
                <td style="padding:8px 8px; color:var(--brown-muted);">${m.watchYear ? formatDate(m.date) : '—'}</td>
                <td style="padding:8px 8px; color:var(--accent);">${stars(m.rating)}</td>
              </tr>`).join('')}
          </tbody>
        </table>`;
    }
    
    function formatDate(dateStr) {
      const d = new Date(dateStr);
      if (isNaN(d)) return '—';
      return d.toLocaleDateString('en-CA', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function renderGrid() {
      const data = filtered().filter(m => m.rating >= 4).sort((a, b) => b.rating - a.rating || a.title.localeCompare(b.title));
      document.getElementById('topTitle').textContent = `Top rated (${data.length})`;
      document.getElementById('movieGrid').innerHTML = data.length
        ? data.map(m => `
          <div class="movie-card">
            <div class="movie-stars">${stars(m.rating)}</div>
            <div class="movie-title" title="${m.title}">${m.title}</div>
            <div class="movie-meta">${m.year} · ${m.type}</div>
          </div>`).join('')
        : '<p class="no-data">No top-rated titles for this filter.</p>';
    }

    function renderAll() { renderMetrics(); renderBar(); renderRecentList(); renderGrid(); }

    fetch(SHEET_URL)
      .then(r => r.text())
      .then(text => { RAW = parseCSV(text); renderYearPills(); renderAll(); })
      .catch(() => {
        document.getElementById('metrics').innerHTML = '<p class="no-data">Could not load sheet data. Check the published URL.</p>';
      });
  </script>

</body>
</html>
